<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - MUI Replica</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="sidebar">
        <div class="logo">AdminPanel</div>
        <ul>
            <li class="active">Dashboard</li>
            <li>Shops</li>
            <li>Services</li>
            <li>Bookings</li>
            <li>Users</li>
        </ul>
    </div>
    <div class="main-content">
        <h1 class="page-title" style="margin-bottom: 8px;">Admin Dashboard</h1>
        <p style="color: #616161; font-size: 16px; margin-top: 0;">Welcome to the admin dashboard. Use the sidebar to
            manage shops, services, bookings, and users.</p>

        <div class="grid-cards">
            <div class="card">
                <div class="card-icon"></div>
                <div class="card-content">
                    <span class="card-title">Total Shops</span>
                    <span class="card-value">12</span>
                </div>
            </div>
            <div class="card">
                <div class="card-icon"></div>
                <div class="card-content">
                    <span class="card-title">Total Services</span>
                    <span class="card-value">25</span>
                </div>
            </div>
            <div class="card">
                <div class="card-icon"></div>
                <div class="card-content">
                    <span class="card-title">Total Bookings</span>
                    <span class="card-value">134</span>
                </div>
            </div>
            <div class="card">
                <div class="card-icon"></div>
                <div class="card-content">
                    <span class="card-title">Total Users</span>
                    <span class="card-value">489</span>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
