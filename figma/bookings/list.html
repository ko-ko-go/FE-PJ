<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Bookings - MUI Replica</title>
    <link rel="stylesheet" href="../style.css">
</head>

<body>
    <div class="sidebar">
        <div class="logo">AdminPanel</div>
        <ul>
            <li>Dashboard</li>
            <li>Shops</li>
            <li>Services</li>
            <li class="active">Bookings</li>
            <li>Users</li>
        </ul>
    </div>
    <div class="main-content">
        <div class="page-header">
            <h1 class="page-title">Manage Bookings</h1>
            <button class="btn btn-contained">ADD BOOKING</button>
        </div>

        <div class="toolbar">
            <input type="text" class="search-field" placeholder="Search Bookings...">
        </div>

        <div class="table-container">
            <table class="table">
                <thead>
                    <tr>
                        <th>Booking ID</th>
                        <th>User</th>
                        <th>Shop</th>
                        <th>Service</th>
                        <th>Date & Time</th>
                        <th style="text-align: right;">Actions</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td>BK-1023</td>
                        <td>John Doe</td>
                        <td>Shop 1 (Sukhumvit)</td>
                        <td>Thai Massage (60 mins)</td>
                        <td>2026-10-12 | 14:00</td>
                        <td style="text-align: right;">
                            <button class="icon-btn">✎</button>
                            <button class="icon-btn">🗑</button>
                        </td>
                    </tr>
                    <tr>
                        <td>BK-1024</td>
                        <td>Jane Smith</td>
                        <td>Shop 2 (Silom)</td>
                        <td>Aromatherapy</td>
                        <td>2026-10-13 | 10:00</td>
                        <td style="text-align: right;">
                            <button class="icon-btn">✎</button>
                            <button class="icon-btn">🗑</button>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</body>

</html>
