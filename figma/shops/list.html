<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Shops - MUI Replica</title>
    <link rel="stylesheet" href="../style.css">
</head>

<body>
    <div class="sidebar">
        <div class="logo">AdminPanel</div>
        <ul>
            <li>Dashboard</li>
            <li class="active">Shops</li>
            <li>Services</li>
            <li>Bookings</li>
            <li>Users</li>
        </ul>
    </div>
    <div class="main-content">
        <div class="page-header">
            <h1 class="page-title">Manage Shops</h1>
            <button class="btn btn-contained">ADD SHOP</button>
        </div>

        <div class="toolbar">
            <input type="text" class="search-field" placeholder="Search Shops...">
        </div>

        <div class="table-container">
            <table class="table">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Name</th>
                        <th>Address</th>
                        <th>Telephone</th>
                        <th style="text-align: right;">Actions</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td>64e8a1...</td>
                        <td>Shop 1 (Sukhumvit)</td>
                        <td>123 Sukhumvit Rd, Bangkok</td>
                        <td>02-111-1111</td>
                        <td style="text-align: right;">
                            <button class="icon-btn">✎</button>
                            <button class="icon-btn">🗑</button>
                        </td>
                    </tr>
                    <tr>
                        <td>64e9f7...</td>
                        <td>Shop 2 (Silom)</td>
                        <td>456 Silom Rd, Bangkok</td>
                        <td>02-222-2222</td>
                        <td style="text-align: right;">
                            <button class="icon-btn">✎</button>
                            <button class="icon-btn">🗑</button>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</body>

</html>
